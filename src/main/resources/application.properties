# ===============================
# CONFIGURACION DEL SERVIDOR
# ===============================
server.port=8080

# ===============================
# CONFIGURACION DE BASE DE DATOS (MySQL)
# ===============================
# Cambia 'root' y la contrasenia por los de tu MySQL local si son diferentes
spring.datasource.url=jdbc:mysql://localhost:3306/techstore_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACION DE JPA / HIBERNATE
# ===============================
# Muestra en la consola el SQL que se ejecuta por detras
spring.jpa.show-sql=true
# update: actualiza las tablas segun tus modelos sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
