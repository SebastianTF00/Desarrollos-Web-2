# ==========================================================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================================================
server.port=${PORT:8080}

# ==========================================================================
# CONFIGURACIÓN DE BASE DE DATOS HÍBRIDA (LOCAL: MYSQL | NUBE: POSTGRESQL)
# ==========================================================================

# 1. URL de Conexión: Si Railway te da la variable, usa Postgres. Si no, usa tu MySQL local.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/techstore_db?useSSL=false&serverTimezone=UTC}

# 2. Driver dinámico: En local usa MySQL, en Railway usa el de PostgreSQL
spring.datasource.driver-class-name=${JDBC_DRIVER:com.mysql.cj.jdbc.Driver}

# 3. Credenciales: Si estás en Railway usa sus variables, si estás en local usa tu root / 1234
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:1234}}

# ==========================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE DINÁMICO
# ==========================================================================
spring.jpa.show-sql=true

# Cambiamos a 'update' para que cree/valide las tablas automáticamente en ambos lados
spring.jpa.hibernate.ddl-auto=update

# 4. Dialecto dinámico: Por defecto usa el de MySQL, pero en la nube inyectaremos el de Postgres
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.MySQLDialect}