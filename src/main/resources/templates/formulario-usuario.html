<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Usuario</title>
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        .form-container { background: #131a26; border: 1px solid #1e293b; padding: 2rem; border-radius: 12px; max-width: 600px; margin-top: 1rem; }
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { color: #94a3b8; font-size: 0.9rem; }
        .form-group input, .form-group select { background: #1a2333; border: 1px solid #1e293b; padding: 0.8rem; border-radius: 8px; color: white; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #3a86ff; }
        .btn-submit { background: #3a86ff; color: #fff; padding: 0.8rem 2rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: inline-flex; gap: 8px; align-items: center;}
        .btn-submit:hover { background: #2563eb; }
        .btn-cancel { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 0.8rem 2rem; border-radius: 8px; text-decoration: none; font-weight: bold; margin-left: 10px;}
    </style>
</head>
<body>

<div class="admin-container">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h1>Admin Panel</h1>
        </div>
        <ul class="menu-list mt-4">
            <li class="menu-item active"><a href="/usuarios"><span class="material-symbols-outlined">arrow_back</span> Volver</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <h2 th:text="${usuario.idUsuario == null ? 'Registrar Usuario' : 'Editar Perfil'}">Usuario</h2>
        <p style="color:#94a3b8; font-size:0.9rem;">Gestiona las credenciales y el nivel de acceso al sistema.</p>

        <div class="form-container">
            <form action="/usuario/guardar" method="POST" th:object="${usuario}">
                
                <input type="hidden" th:field="*{idUsuario}" />

                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" th:field="*{nombre}" placeholder="Ej. Juan Pérez" required maxlength="100">
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" th:field="*{correo}" placeholder="correo@ejemplo.com" required maxlength="100">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" th:field="*{contrasenia}" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Rol de Usuario</label>
                        <select th:field="*{rol}" required>
                            <option value="CLIENTE">Cliente (Comprador)</option>
                            <option value="ADMIN">Administrador</option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn-submit"><span class="material-symbols-outlined">save</span> Guardar Usuario</button>
                    <a href="/usuarios" class="btn-cancel">Cancelar</a>
                </div>

            </form>
        </div>
    </main>
</div>

</body>
</html>
