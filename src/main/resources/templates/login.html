<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Acceso</title>
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="login-body">

<div class="login-card">
    <h2>Acceso Administrativo</h2>
    <p>Ingresa tus credenciales para continuar</p>

    <div class="alert-danger" th:if="${error != null}">
        <span class="material-symbols-outlined">error</span>
        <span th:text="${error}">Credenciales incorrectas. Acceso denegado.</span>
    </div>

    <form th:action="@{/login}" method="POST">
        <div class="form-group" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 0.9rem; color: #94a3b8; font-weight: 600;">Correo Electrónico</label>
            <div class="input-icon-group">
                <span class="material-symbols-outlined">mail</span>
                <input type="email" name="correo" placeholder="correo@gmail.com" required />
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 0.9rem; color: #94a3b8; font-weight: 600;">Contraseña</label>
            <div class="input-icon-group">
                <span class="material-symbols-outlined">lock</span>
                <input type="password" name="password" placeholder="••••••••" required />
            </div>
        </div>

        <button type="submit" class="btn-login">Ingresar al Sistema</button>
    </form>

    <a href="/" class="back-link">
        <span class="material-symbols-outlined" style="font-size: 1.1rem;">arrow_back</span>
        Volver a la Tienda
    </a>
</div>

</body>
</html>
